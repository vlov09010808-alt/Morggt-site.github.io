<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Проекты - Morggt</title>
    <style>
        body {
            margin: 0; padding: 0;
            background: linear-gradient(135deg, #0f2027 0%, #2c5364 50%, #9146ff 100%);
            background-attachment: fixed;
            color: white; font-family: 'Segoe UI', sans-serif;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }
        nav { width: 100%; padding: 20px 0; display: flex; justify-content: center; gap: 35px; background: rgba(0,0,0,0.5); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(145, 70, 255, 0.3); }
        nav a { color: white; text-decoration: none; font-weight: 700; opacity: 0.8; transition: 0.3s; font-size: 13px; text-transform: uppercase; }
        nav a:hover { opacity: 1; color: #bf94ff; }
        
        .container { width: 90%; max-width: 1000px; margin-top: 50px; }
        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .create-btn { background: #9146ff; color: white; padding: 15px 30px; border-radius: 12px; text-decoration: none; font-weight: 900; transition: 0.3s; box-shadow: 0 0 15px rgba(145, 70, 255, 0.4); }
        .create-btn:hover { transform: scale(1.05); background: #a970ff; }

        .project-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .project-card { background: rgba(15, 15, 20, 0.9); padding: 30px; border-radius: 25px; border: 1px solid rgba(145, 70, 255, 0.3); }
        .project-card h3 { margin: 0 0 10px 0; color: #bf94ff; font-size: 24px; }
        .project-card p { color: #adadb8; line-height: 1.6; }
        .author-tag { display: inline-block; background: rgba(145, 70, 255, 0.2); padding: 5px 12px; border-radius: 8px; font-size: 12px; color: #bf94ff; margin-bottom: 15px; }

        .admin-link { margin-top: auto; padding: 20px; opacity: 0.3; cursor: pointer; font-size: 12px; }
        .admin-link:hover { opacity: 1; }
    </style>
</head>
<body>
    <nav>
        <a href="index.html">Главная</a>
        <a href="projects.html">Проекты подписчиков</a>
        <a href="fans.html">Страница подписчиков</a>
    </nav>

    <div class="container">
        <div class="header-row">
            <h1>Проекты комьюнити</h1>
            <a href="https://formspree.io" class="create-btn">+ Предложить проект</a>
        </div>

        <div class="project-grid">
            <div class="project-card">
                <span class="author-tag">От: Moderator_Chare</span>
                <h3>Официальный сайт</h3>
                <p>Мы запустили этот сайт! Теперь у Morggt есть крутой хаб со всеми ссылками и проектами.</p>
            </div>
            <!-- Сюда добавляй новые карточки проектов -->
        </div>
    </div>

    <div class="admin-link" onclick="checkAdmin()">Вход для модератора</div>

    <script>
        function checkAdmin() {
            let pass = prompt("Пароль доступа:");
            if (pass === "Chare") {
                alert("Привет, админ! Чтобы добавить проект навсегда, просто скопируй блок 'project-card' в коде этого файла.");
            } else {
                alert("Отказ в доступе.");
            }
        }
    </script>
</body>
</html>
