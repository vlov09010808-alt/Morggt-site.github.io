<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Проекты - Morggt</title>
    <style>
        body { margin: 0; padding: 0; background: linear-gradient(135deg, #1e3c72 0%, #6a11cb 100%); background-attachment: fixed; color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        nav { width: 100%; padding: 20px 0; display: flex; justify-content: center; gap: 30px; background: rgba(0,0,0,0.4); backdrop-filter: blur(10px); }
        nav a { color: white; text-decoration: none; font-weight: 600; opacity: 0.7; transition: 0.3s; font-size: 13px; text-transform: uppercase; }
        nav a:hover { opacity: 1; color: #bf94ff; }
        
        .header-box { width: 90%; max-width: 1000px; display: flex; justify-content: space-between; align-items: center; margin-top: 40px; }
        .create-btn { background: #9146ff; color: white; padding: 12px 25px; border-radius: 10px; text-decoration: none; font-weight: bold; transition: 0.3s; }
        .create-btn:hover { background: #772ce8; transform: scale(1.05); }

        .project-list { width: 90%; max-width: 1000px; margin-top: 30px; display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 100%)); gap: 20px; }
        .project-card { background: rgba(20, 20, 23, 0.9); padding: 25px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); position: relative; }
        .project-card h3 { margin: 0 0 10px 0; color: #bf94ff; }
        .project-card .author { font-size: 14px; color: #adadb8; margin-bottom: 10px; }
        
        /* Скрытая форма */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: #18181b; padding: 40px; border-radius: 30px; width: 90%; max-width: 500px; border: 1px solid #9146ff; }
        input, textarea { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 10px; border: 1px solid #333; background: #0a0a0a; color: white; box-sizing: border-box; }
        .close-btn { color: #adadb8; cursor: pointer; float: right; }
    </style>
</head>
<body>
    <nav>
        <a href="index.html">Главная</a>
        <a href="projects.html">Проекты подписчиков</a>
        <a href="fans.html">Страница подписчиков</a>
        <a href="#" onclick="loginAdmin()">Админ</a>
    </nav>

    <div class="header-box">
        <h1>Проекты</h1>
        <a href="#" class="create-btn" onclick="openModal()">+ Создать проект</a>
    </div>

    <div class="project-list" id="projectList">
        <!-- Пример проекта -->
        <div class="project-card">
            <div class="author">От: Moderator_Chare</div>
            <h3>Сайт для Morggt</h3>
            <p>Первая версия официального хаба для ссылок.</p>
            <div class="author">Связь: Telegram</div>
        </div>
    </div>

    <!-- Модальное окно создания -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">✖ Закрыть</span>
            <h2>Новый проект</h2>
            <form action="https://formspree.io" method="POST">
                <input type="text" name="nick" placeholder="Ваш никнейм" required>
                <input type="text" name="title" placeholder="Название проекта" required>
                <textarea name="desc" placeholder="Описание проекта" required></textarea>
                <input type="text" name="contact" placeholder="Средство связи (ТГ/ВК)" required>
                <button type="submit" style="width:100%; padding:15px; background:#9146ff; color:white; border:none; border-radius:10px; font-weight:bold; cursor:pointer;">Отправить на модерацию</button>
            </form>
        </div>
    </div>

    <script>
        function openModal() { document.getElementById('modal').style.display = 'flex'; }
        function closeModal() { document.getElementById('modal').style.display = 'none'; }
        
        function loginAdmin() {
            let pass = prompt("Введите пароль админа:");
            if (pass === "Chare") {
                alert("Доступ разрешен! Теперь вы можете добавлять проекты (через код или форму).");
                // Тут можно добавить логику редактирования
            } else {
                alert("Неверный пароль!");
            }
        }
    </script>
</body>
</html>
