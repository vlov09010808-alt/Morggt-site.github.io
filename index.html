<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Morggt - Official</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            /* Сине-фиолетовый градиент на весь экран */
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 30%, #9146ff 100%);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            text-align: center;
            background: rgba(24, 24, 27, 0.85); /* Полупрозрачный темный фон */
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            width: 350px;
            backdrop-filter: blur(10px); /* Эффект матового стекла */
            border: 1px solid rgba(255,255,255,0.1);
        }
        .profile-img {
            width: 180px;
            height: 180px;
            border-radius: 25px; /* Скругленные углы вместо круга, так фотка лучше впишется */
            border: 4px solid #bf94ff;
            margin-bottom: 20px;
            object-fit: cover;
            box-shadow: 0 0 20px rgba(145, 70, 255, 0.5);
        }
        h1 { margin: 10px 0; font-size: 28px; letter-spacing: 1px; }
        p { color: #adadb8; margin-bottom: 30px; font-style: italic; }
        .links { display: flex; flex-direction: column; gap: 15px; }
        .link {
            background: #9146ff;
            color: white;
            text-decoration: none;
            padding: 15px;
            border-radius: 12px;
            font-weight: bold;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .link:hover {
            background: #772ce8;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .link-yt { background: #ff0000; } /* Красная кнопка для YouTube */
        .link-yt:hover { background: #cc0000; }
        .link-tg { background: #0088cc; } /* Синяя для TG */
        .link-tg:hover { background: #0077b5; }
    </style>
</head>
<body>
    <div class="card">
        <!-- Я подготовил прямую ссылку на фото из твоего сообщения -->
        <img src="https://ibb.co" alt="Morggt" class="profile-img">
        <h1>MORGGT</h1>
        <p>Official Content Creator</p>
        
        <div class="links">
            <a href="https://www.twitch.tv/morggt_nya" target="_blank" class="link">Twitch</a>
            <a href="https://t.me/morggt23" target="_blank" class="link link-tg">Telegram</a>
            <a href="https://youtube.com/@hero_26-rx8yx?si=H1Qw14755fQAXEFY" target="_blank" class="link link-yt">YouTube</a>
        </div>
    </div>
</body>
</html>
