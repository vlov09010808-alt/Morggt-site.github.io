<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Morggt - Official</title>
    <style>
        body { margin: 0; padding: 0; background: #0e0e10; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { text-align: center; background: #18181b; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 300px; }
        img { width: 120px; height: 120px; border-radius: 50%; border: 4px solid #bf94ff; margin-bottom: 20px; }
        h1 { margin: 10px 0; font-size: 24px; }
        p { color: #adadb8; margin-bottom: 30px; }
        .links { display: flex; flex-direction: column; gap: 15px; }
        .link { background: #9146ff; color: white; text-decoration: none; padding: 12px; border-radius: 8px; font-weight: bold; transition: 0.3s; }
        .link:hover { background: #772ce8; transform: scale(1.05); }
    </style>
</head>
<body>
    <div class="card">
        <!-- Сюда потом вставим реальную фотку -->
        <img src="https://placeholder.com" alt="Morggt">
        <h1>Morggt</h1>
        <p>Official Links</p>
        
        <div class="links">
            <a href="https://twitch.tv" target="_blank" class="link">Twitch</a>
            <a href="#" target="_blank" class="link">Telegram</a>
            <a href="#" target="_blank" class="link">VK Group</a>
        </div>
    </div>
</body>
</html>
