<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Morggt - Links Hub</title>
    <style>
        body {
            margin: 0; padding: 0;
            /* Тот самый сине-фиолетовый градиент из первых вариантов */
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            background-attachment: fixed;
            color: white; font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; overflow: hidden; position: relative;
        }

        /* Декор фона (квадраты и линии) */
        .bg-shape {
            position: absolute; background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(5px); border: 1px solid rgba(255, 255, 255, 0.05);
            z-index: 1; animation: float 12s infinite ease-in-out;
        }
        .shape1 { width: 100px; height: 100px; top: 15%; left: 10%; border-radius: 20px; }
        .shape2 { width: 150px; height: 150px; bottom: 15%; right: 10%; border-radius: 50%; }
        .shape3 { width: 300px; height: 1px; top: 30%; right: -50px; background: rgba(255,255,255,0.1); transform: rotate(-45deg); }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }

        /* Компактная карточка */
        .card {
            background: rgba(13, 13, 15, 0.98);
            padding: 30px; border-radius: 24px;
            display: flex; align-items: center; gap: 30px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 600px; width: 92%; position: relative; z-index: 10;
        }

        .profile-img {
            width: 160px; height: 160px;
            border-radius: 20px; border: 3px solid #9146ff;
            object-fit: cover; box-shadow: 0 0 30px rgba(145, 70, 255, 0.4);
        }

        .info-side { text-align: left; flex: 1; }
        h1 { margin: 0; font-size: 34px; font-weight: 900; letter-spacing: -1px; }
        .subtitle { color: #9146ff; margin: 2px 0 12px 0; font-size: 13px; text-transform: uppercase; font-weight: bold; letter-spacing: 1.5px; }
        .description { font-size: 13px; line-height: 1.5; color: #adadb8; margin-bottom: 20px; }

        /* Кнопки в две колонки */
        .links { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 10px; 
        }
        .link {
            text-align: center; color: white; text-decoration: none;
            padding: 12px 5px; border-radius: 12px; font-weight: 800;
            transition: 0.3s ease; text-transform: uppercase; font-size: 11px;
            letter-spacing: 0.5px;
        }
        .link:hover { transform: translateY(-3px); filter: brightness(1.2); box-shadow: 0 5px 20px rgba(0,0,0,0.5); }
        
        /* Цвета кнопок (оттенки первого столбика) */
        .twitch { background: #6441a5; }
        .tg { background: #0088cc; }
        .ds { background: #5865F2; }
        .vk { background: #4a69bd; }

        /* Второй столбик - вариации синего/фиолетового + Boosty и Donate */
        .kick { background: #44337a; } /* Темно-фиолетовый */
        .yt { background: #2b6cb0; }   /* Глубокий синий */
        .boosty { background: #ff8c00; } /* Сочный оранжевый */
        .da { background: #ed8936; }    /* Светло-оранжевый (Donate) */

        @media (max-width: 580px) {
            .card { flex-direction: column; text-align: center; padding: 25px; }
            .info-side { width: 100%; }
            .profile-img { width: 140px; height: 140px; }
            .links { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="bg-shape shape1"></div>
    <div class="bg-shape shape2"></div>
    <div class="bg-shape shape3"></div>

    <div class="card">
        <img src="Morggt.png.png" alt="Morggt" class="profile-img">
        <div class="info-side">
            <h1>MORGGT</h1>
            <div class="subtitle">Official Content Creator</div>
            <div class="description">
                Общаюсь с чатом, создаю движ и ценю каждого в своем комьюнити. Поддерживай и подписывайся!
            </div>
            
            <div class="links">
                <a href="https://twitch.tv" target="_blank" class="link twitch">Twitch</a>
                <a href="https://kick.com" target="_blank" class="link kick">Kick</a>
                <a href="https://t.me" target="_blank" class="link tg">Telegram</a>
                <a href="https://youtube.com" target="_blank" class="link yt">YouTube</a>
                <a href="https://discord.gg" target="_blank" class="link ds">Discord</a>
                <a href="https://boosty.to" target="_blank" class="link boosty">Boosty</a>
                <a href="https://vk.com" target="_blank" class="link vk">VK Group</a>
                <a href="https://donationalerts.com" target="_blank" class="link da">Donate</a>
            </div>
        </div>
    </div>

</body>
</html>
