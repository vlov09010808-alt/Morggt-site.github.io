<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Morggt - Official</title>
    <style>
        body {
            margin: 0; padding: 0;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 30%, #9146ff 100%);
            background-attachment: fixed;
            color: white; font-family: 'Segoe UI', sans-serif;
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; overflow: hidden; /* Чтобы фигуры не создавали прокрутку */
            position: relative;
        }

        /* Декоративные элементы фона */
        .bg-shape {
            position: absolute;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1;
            animation: float 10s infinite linear;
        }

        .shape1 { width: 100px; height: 100px; top: 10%; left: 10%; border-radius: 20px; }
        .shape2 { width: 150px; height: 150px; bottom: 15%; right: 10%; border-radius: 50%; }
        .shape3 { width: 80px; height: 80px; top: 60%; left: 5%; transform: rotate(45deg); }
        .shape4 { width: 200px; height: 2px; top: 30%; right: 5%; background: linear-gradient(to right, transparent, rgba(255,255,255,0.2), transparent); }

        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
            100% { transform: translateY(0) rotate(0deg); }
        }

        /* Сама карточка */
        .card {
            background: rgba(10, 10, 10, 0.95);
            padding: 30px; border-radius: 25px;
            display: flex; align-items: center; gap: 30px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 700px; width: 90%;
            position: relative; z-index: 10; /* Чтобы карточка была над фигурами */
        }

        .profile-img {
            width: 180px; height: 180px;
            border-radius: 20px; border: 3px solid #9146ff;
            object-fit: cover; box-shadow: 0 0 20px rgba(145, 70, 255, 0.3);
        }

        .info-side { text-align: left; flex: 1; }
        h1 { margin: 0; font-size: 36px; font-weight: 900; color: #fff; }
        .subtitle { color: #bf94ff; margin: 5px 0 15px 0; font-size: 14px; text-transform: uppercase; font-weight: bold; }
        
        .description { font-size: 14px; line-height: 1.5; color: #adadb8; margin-bottom: 20px; }

        .links { display: flex; flex-direction: column; gap: 10px; }
        .link {
            text-align: center; color: white; text-decoration: none;
            padding: 12px; border-radius: 10px; font-weight: 700;
            transition: 0.3s; text-transform: uppercase; font-size: 12px;
        }
        .link:hover { transform: translateY(-2px); filter: brightness(1.1); }
        
        .twitch { background: #9146ff; }
        .tg { background: #0088cc; }
        .yt { background: #ff0000; }

        @media (max-width: 600px) {
            .card { flex-direction: column; text-align: center; padding: 25px; }
            .profile-img { width: 150px; height: 150px; }
            .bg-shape { display: none; } /* Убираем лишнее на мобилках */
        }
    </style>
</head>
<body>

    <!-- Фоновые фигуры -->
    <div class="bg-shape shape1"></div>
    <div class="bg-shape shape2"></div>
    <div class="bg-shape shape3"></div>
    <div class="bg-shape shape4"></div>

    <div class="card">
        <img src="Morggt.png.png" alt="Morggt" class="profile-img">
        <div class="info-side">
            <h1>MORGGT</h1>
            <div class="subtitle">Official Streamer</div>
            <div class="description">
                Тот самый стример, который делает контент для души. Общаюсь с чатом, создаю движ и ценю каждого в своем комьюнити.
            </div>
            <div class="links">
                <a href="https://twitch.tv" target="_blank" class="link twitch">Twitch</a>
                <a href="https://t.me" target="_blank" class="link tg">Telegram</a>
                <a href="https://youtube.com" target="_blank" class="link yt">YouTube</a>
            </div>
        </div>
    </div>

</body>
</html>
