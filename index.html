<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Morggt - Premium Hub</title>
    <style>
        body {
            margin: 0; padding: 0;
            /* Насыщенный сине-фиолетовый градиент */
            background: radial-gradient(circle at center, #1a1c2c 0%, #4b4494 100%);
            background-attachment: fixed;
            color: white; font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; overflow: hidden; position: relative;
        }

        /* Светящиеся пятна на фоне для яркости */
        .glow {
            position: absolute; width: 400px; height: 400px;
            background: rgba(145, 70, 255, 0.15);
            filter: blur(100px); border-radius: 50%; z-index: 1;
        }

        /* Компактная, но широкая карточка */
        .card {
            background: rgba(10, 10, 12, 0.95);
            padding: 25px 35px; border-radius: 30px;
            display: flex; align-items: center; gap: 35px;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.8), 0 0 20px rgba(123, 97, 255, 0.2);
            border: 1px solid rgba(123, 97, 255, 0.3);
            max-width: 750px; width: 90%; position: relative; z-index: 10;
        }

        /* Крупная картинка */
        .profile-img {
            width: 220px; height: 220px;
            border-radius: 25px; border: 3px solid #7b61ff;
            object-fit: cover; 
            box-shadow: 0 0 30px rgba(123, 97, 255, 0.4);
            transition: 0.4s;
        }
        .profile-img:hover { transform: scale(1.03); box-shadow: 0 0 40px rgba(123, 97, 255, 0.6); }

        .info-side { text-align: left; flex: 1; }
        h1 { margin: 0; font-size: 36px; font-weight: 900; letter-spacing: -1px; text-shadow: 0 0 15px rgba(255,255,255,0.2); }
        .subtitle { color: #7b61ff; margin: 2px 0 10px 0; font-size: 14px; text-transform: uppercase; font-weight: bold; letter-spacing: 2px; }
        .description { font-size: 13px; line-height: 1.4; color: #a0a0b0; margin-bottom: 20px; max-width: 400px; }

        /* Компактные кнопки */
        .links { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .link {
            text-align: center; color: white; text-decoration: none;
            padding: 10px 5px; border-radius: 10px; font-weight: 700;
            transition: 0.3s; text-transform: uppercase; font-size: 11px;
            letter-spacing: 0.5px; border: 1px solid rgba(255,255,255,0.05);
        }
        .link:hover { transform: translateY(-2px); filter: brightness(1.2); box-shadow: 0 5px 15px rgba(0,0,0,0.4); }
        
        /* Цвета кнопок (насыщенные, но благородные) */
        .twitch { background: #6441a5; }
        .tg { background: #2481cc; }
        .ds { background: #5865F2; }
        .vk { background: #4a69bd; }
        .kick { background: #41b01e; }
        .yt { background: #b31217; }
        .boosty { background: #f15f2c; }
        .da { background: #e3a200; }

        @media (max-width: 700px) {
            .card { flex-direction: column; text-align: center; padding: 30px 20px; }
            .profile-img { width: 180px; height: 180px; }
            .links { grid-template-columns: 1fr; width: 100%; }
        }
    </style>
</head>
<body>

    <div class="glow" style="top: -10%; left: -10%;"></div>
    <div class="glow" style="bottom: -10%; right: -10%;"></div>

    <div class="card">
        <img src="Morggt.png.png" alt="Morggt" class="profile-img">
        
        <div class="info-side">
            <h1>MORGGT</h1>
            <div class="subtitle">Official Content Creator</div>
            <div class="description">
                Создаю контент для души, ценю каждого в комьюнити. Поддерживай и подписывайся!
            </div>
            
            <div class="links">
                <a href="https://twitch.tv" target="_blank" class="link twitch">Twitch</a>
                <a href="https://kick.com" target="_blank" class="link kick">Kick</a>
                <a href="https://t.me" target="_blank" class="link tg">Telegram</a>
                <a href="https://youtube.com" target="_blank" class="link yt">YouTube</a>
                <a href="https://discord.gg" target="_blank" class="link ds">Discord</a>
                <a href="https://boosty.to" target="_blank" class="link boosty">Boosty</a>
                <a href="https://vk.com" target="_blank" class="link vk">VK Group</a>
                <a href="https://donationalerts.com" target="_blank" class="link da">Donate</a>
            </div>
        </div>
    </div>

</body>
</html>
