<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Morggt - Official Website</title>
    <style>
        body {
            margin: 0; padding: 0;
            /* Красивый градиент: синий переходит в глубокий фиолетовый */
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 30%, #6a11cb 70%, #2575fc 100%);
            background-attachment: fixed;
            color: white; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        /* Верхнее меню навигации */
        nav {
            width: 100%; padding: 20px 0;
            display: flex; justify-content: center; gap: 40px;
            background: rgba(0, 0, 0, 0.3); backdrop-filter: blur(10px);
            position: sticky; top: 0; z-index: 100;
        }
        nav a {
            color: white; text-decoration: none; font-weight: 600; 
            opacity: 0.8; transition: 0.3s; font-size: 14px; text-transform: uppercase; letter-spacing: 1px;
        }
        nav a:hover { opacity: 1; color: #bf94ff; text-shadow: 0 0 10px #9146ff; }

        /* Контейнер центральной карточки */
        .main-container {
            display: flex; align-items: center; justify-content: center; flex-grow: 1; padding: 40px 20px;
        }
        .card {
            background: rgba(24, 24, 27, 0.9);
            padding: 50px; border-radius: 40px;
            display: flex; align-items: center; gap: 50px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.7);
            border: 1px solid rgba(255,255,255,0.1);
            max-width: 800px;
        }

        /* Стили картинки */
        .profile-img {
            width: 280px; height: 280px;
            border-radius: 30px; border: 4px solid #9146ff;
            object-fit: cover; 
            box-shadow: 0 0 30px rgba(145, 70, 255, 0.4);
            transition: transform 0.5s ease;
        }
        .profile-img:hover { transform: scale(1.02); }

        /* Текстовая часть */
        .info-side { text-align: left; width: 320px; }
        h1 { margin: 0 0 5px 0; font-size: 42px; font-weight: 800; letter-spacing: -1px; }
        .subtitle { color: #adadb8; margin-bottom: 35px; font-size: 16px; font-weight: 400; }
        
        /* Кнопки соцсетей */
        .links { display: flex; flex-direction: column; gap: 15px; }
        .link {
            text-align: center; color: white; text-decoration: none;
            padding: 16px; border-radius: 12px; font-weight: bold;
            transition: 0.3s; text-transform: uppercase; font-size: 14px;
            letter-spacing: 1px; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .link:hover { transform: translateY(-3px); filter: brightness(1.2); box-shadow: 0 8px 25px rgba(0,0,0,0.4); }
        
        .twitch { background: #9146ff; }
        .tg { background: #0088cc; }
        .yt { background: #ff0000; }

        /* Адаптация для мобилок */
        @media (max-width: 750px) {
            .card { flex-direction: column; text-align: center; padding: 30px; }
            .info-side { text-align: center; }
            .profile-img { width: 200px; height: 200px; }
            nav { gap: 15px; padding: 15px 10px; }
            nav a { font-size: 11px; }
        }
    </style>
</head>
<body>

    <!-- Меню -->
    <nav>
        <a href="index.html">Главная</a>
        <a href="projects.html">Проекты подписчиков</a>
        <a href="fans.html">Страница подписчиков</a>
    </nav>

    <!-- Основной контент -->
    <div class="main-container">
        <div class="card">
            <!-- ВАЖНО: загрузи фото в GitHub и назови его avatar.jpg -->
            <img src="avatar.jpg" alt="Morggt" class="profile-img">
            
            <div class="info-side">
                <h1>MORGGT</h1>
                <div class="subtitle">Official Content Creator</div>
                
                <div class="links">
                    <a href="https://twitch.tv" target="_blank" class="link twitch">Twitch</a>
                    <a href="https://t.me" target="_blank" class="link tg">Telegram</a>
                    <a href="https://youtube.com" target="_blank" class="link yt">YouTube</a>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
