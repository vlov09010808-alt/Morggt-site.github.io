<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Morggt - Links Hub</title>
    <style>
        body {
            margin: 0; padding: 0;
            /* Сделал градиент светлее и ярче */
            background: radial-gradient(circle at center, #3a539b 0%, #2c3e50 40%, #8e44ad 100%);
            background-attachment: fixed;
            color: white; font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; overflow: hidden; position: relative;
        }

        /* Декор фона (более заметный) */
        .bg-shape {
            position: absolute; background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(2px); border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1; animation: float 15s infinite ease-in-out;
        }
        .shape1 { width: 120px; height: 120px; top: 10%; left: 8%; border-radius: 25px; }
        .shape2 { width: 180px; height: 180px; bottom: 12%; right: 7%; border-radius: 50%; }

        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-30px) scale(1.05); }
        }

        .card {
            background: rgba(20, 20, 25, 0.92); /* Чуть прозрачнее и светлее */
            padding: 30px; border-radius: 28px;
            display: flex; align-items: center; gap: 30px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4), inset 0 0 20px rgba(255,255,255,0.02);
            border: 1px solid rgba(255, 255, 255, 0.12);
            max-width: 620px; width: 92%; position: relative; z-index: 10;
        }

        .profile-img {
            width: 160px; height: 160px;
            border-radius: 22px; border: 3px solid #9b59b6;
            object-fit: cover; box-shadow: 0 10px 30px rgba(155, 89, 182, 0.4);
        }

        .info-side { text-align: left; flex: 1; }
        h1 { margin: 0; font-size: 32px; font-weight: 900; color: #fff; text-shadow: 0 2px 10px rgba(0,0,0,0.3); }
        .subtitle { color: #a29bfe; margin: 2px 0 12px 0; font-size: 13px; text-transform: uppercase; font-weight: bold; letter-spacing: 1.5px; }
        .description { font-size: 13px; line-height: 1.5; color: #d1d1e0; margin-bottom: 20px; }

        .links { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .link {
            text-align: center; color: white; text-decoration: none;
            padding: 12px 5px; border-radius: 12px; font-weight: 700;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); text-transform: uppercase; font-size: 11px;
            letter-spacing: 0.5px;
        }
        .link:hover { transform: translateY(-3px); filter: brightness(1.15); box-shadow: 0 8px 20px rgba(0,0,0,0.3); }
        
        /* 1-й СТОЛБИК */
        .twitch { background: #6c5ce7; }
        .tg { background: #0984e3; }
        .ds { background: #6c71c4; }
        .vk { background: #4a69bd; }

        /* 2-й СТОЛБИК (Спокойные цвета) */
        .kick { background: #55efc4; color: #2d3436; } /* Мягкий мятный */
        .yt { background: #fab1a0; color: #2d3436; }   /* Персиковый вместо алого */
        .boosty { background: #e17055; }               /* Приглушенный терракотовый */
        .da { background: #ffeaa7; color: #2d3436; }   /* Светло-песочный */

        @media (max-width: 580px) {
            .card { flex-direction: column; text-align: center; padding: 25px; }
            .profile-img { width: 140px; height: 140px; }
            .links { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="bg-shape shape1"></div>
    <div class="bg-shape shape2"></div>

    <div class="card">
        <img src="Morggt.png.png" alt="Morggt" class="profile-img">
        <div class="info-side">
            <h1>MORGGT</h1>
            <div class="subtitle">Official Content Creator</div>
            <div class="description">
                Общаюсь с чатом, создаю движ и ценю каждого в своем комьюнити. Поддерживай и подписывайся!
            </div>
            
            <div class="links">
                <a href="https://twitch.tv" target="_blank" class="link twitch">Twitch</a>
                <a href="https://kick.com" target="_blank" class="link kick">Kick</a>
                <a href="https://t.me" target="_blank" class="link tg">Telegram</a>
                <a href="https://youtube.com" target="_blank" class="link yt">YouTube</a>
                <a href="https://discord.gg" target="_blank" class="link ds">Discord</a>
                <a href="https://boosty.to" target="_blank" class="link boosty">Boosty</a>
                <a href="https://vk.com" target="_blank" class="link vk">VK Group</a>
                <a href="https://donationalerts.com" target="_blank" class="link da">Donate</a>
            </div>
        </div>
    </div>

</body>
</html>
