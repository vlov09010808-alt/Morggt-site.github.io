<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Morggt - Links Hub</title>
    <style>
        body {
            margin: 0; padding: 0;
            /* Более насыщенный и глубокий градиент */
            background: linear-gradient(135deg, #0b0e14 0%, #1a1c2c 30%, #302b63 60%, #4b4494 100%);
            background-attachment: fixed;
            color: white; font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; overflow: hidden; position: relative;
        }

        /* Декор фона */
        .bg-shape {
            position: absolute; background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(4px); border: 1px solid rgba(255, 255, 255, 0.03);
            z-index: 1; animation: float 15s infinite ease-in-out;
        }
        .shape1 { width: 120px; height: 120px; top: 10%; left: 8%; border-radius: 25px; }
        .shape2 { width: 180px; height: 180px; bottom: 12%; right: 7%; border-radius: 50%; }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-25px) rotate(8deg); }
        }

        /* Карточка */
        .card {
            background: rgba(13, 13, 15, 0.98);
            padding: 30px; border-radius: 24px;
            display: flex; align-items: center; gap: 30px;
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.06);
            max-width: 620px; width: 92%; position: relative; z-index: 10;
        }

        .profile-img {
            width: 160px; height: 160px;
            border-radius: 22px; border: 3px solid #5d3fd3;
            object-fit: cover; box-shadow: 0 10px 30px rgba(93, 63, 211, 0.3);
        }

        .info-side { text-align: left; flex: 1; }
        h1 { margin: 0; font-size: 32px; font-weight: 900; letter-spacing: -1px; }
        .subtitle { color: #7b61ff; margin: 2px 0 12px 0; font-size: 13px; text-transform: uppercase; font-weight: bold; letter-spacing: 1.5px; }
        .description { font-size: 13px; line-height: 1.5; color: #8e8e9e; margin-bottom: 20px; }

        /* Кнопки */
        .links { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .link {
            text-align: center; color: rgba(255,255,255,0.9); text-decoration: none;
            padding: 12px 5px; border-radius: 12px; font-weight: 700;
            transition: 0.3s ease; text-transform: uppercase; font-size: 11px;
            letter-spacing: 0.5px;
        }
        .link:hover { transform: translateY(-2px); filter: brightness(1.15); box-shadow: 0 5px 15px rgba(0,0,0,0.4); }
        
        /* Цвета кнопок (приглушенные) */
        .twitch { background: #4b367c; }
        .tg { background: #286090; }
        .ds { background: #404eed; }
        .vk { background: #3b5998; }

        /* Специальные цвета (мягкие) */
        .kick { background: #2a5a1e; }  /* Приглушенный зеленый */
        .yt { background: #8b1a1a; }    /* Приглушенный темно-красный */
        .boosty { background: #9e552c; } /* Приглушенный оранжевый */
        .da { background: #a67c00; }    /* Приглушенный золотой */

        @media (max-width: 580px) {
            .card { flex-direction: column; text-align: center; padding: 25px; }
            .info-side { width: 100%; }
            .profile-img { width: 140px; height: 140px; }
            .links { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="bg-shape shape1"></div>
    <div class="bg-shape shape2"></div>

    <div class="card">
        <img src="Morggt.png.png" alt="Morggt" class="profile-img">
        <div class="info-side">
            <h1>MORGGT</h1>
            <div class="subtitle">Official Content Creator</div>
            <div class="description">
                Общаюсь с чатом, создаю движ и ценю каждого в своем комьюнити. Поддерживай и подписывайся!
            </div>
            
            <div class="links">
                <a href="https://twitch.tv" target="_blank" class="link twitch">Twitch</a>
                <a href="https://kick.com" target="_blank" class="link kick">Kick</a>
                <a href="https://t.me" target="_blank" class="link tg">Telegram</a>
                <a href="https://youtube.com" target="_blank" class="link yt">YouTube</a>
                <a href="https://discord.gg" target="_blank" class="link ds">Discord</a>
                <a href="https://boosty.to" target="_blank" class="link boosty">Boosty</a>
                <a href="https://vk.com" target="_blank" class="link vk">VK Group</a>
                <a href="https://donationalerts.com" target="_blank" class="link da">Donate</a>
            </div>
        </div>
    </div>

</body>
</html>
