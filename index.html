<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Morggt - Official Website</title>
    <style>
        body {
            margin: 0; padding: 0;
            /* Фирменный градиент: синий в фиолетовый */
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 30%, #6a11cb 70%, #2575fc 100%);
            background-attachment: fixed;
            color: white; font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        /* Навигация */
        nav {
            width: 100%; padding: 20px 0;
            display: flex; justify-content: center; gap: 40px;
            background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(15px);
            position: sticky; top: 0; z-index: 100; border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        nav a {
            color: white; text-decoration: none; font-weight: 600; 
            opacity: 0.7; transition: 0.3s; font-size: 13px; text-transform: uppercase; letter-spacing: 1.5px;
        }
        nav a:hover { opacity: 1; color: #bf94ff; text-shadow: 0 0 15px #9146ff; }

        /* Контейнер */
        .main-container {
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            flex-grow: 1; padding: 60px 20px; width: 100%; box-sizing: border-box;
        }

        /* Главная карточка */
        .card {
            background: rgba(20, 20, 23, 0.95);
            padding: 50px; border-radius: 40px;
            display: flex; align-items: center; gap: 50px;
            box-shadow: 0 30px 70px rgba(0,0,0,0.8);
            border: 1px solid rgba(255,255,255,0.08);
            max-width: 900px; width: 100%; box-sizing: border-box;
        }

        /* Картинка (твоя avatar.PNG) */
        .profile-img {
            width: 320px; height: 320px;
            border-radius: 35px; border: 5px solid #9146ff;
            object-fit: cover; 
            box-shadow: 0 0 40px rgba(145, 70, 255, 0.5);
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .profile-img:hover { transform: rotate(-2deg) scale(1.03); }

        /* Инфо */
        .info-side { text-align: left; flex: 1; }
        h1 { margin: 0 0 10px 0; font-size: 52px; font-weight: 900; letter-spacing: -2px; line-height: 1; }
        .subtitle { color: #bf94ff; margin-bottom: 35px; font-size: 18px; font-weight: 500; text-transform: uppercase; letter-spacing: 2px; }
        
        /* Кнопки */
        .links { display: flex; flex-direction: column; gap: 15px; }
        .link {
            text-align: center; color: white; text-decoration: none;
            padding: 18px; border-radius: 15px; font-weight: 800;
            transition: 0.3s; text-transform: uppercase; font-size: 15px;
            letter-spacing: 1px;
        }
        .link:hover { transform: translateX(10px); filter: brightness(1.2); box-shadow: 0 10px 25px rgba(0,0,0,0.4); }
        
        .twitch { background: #9146ff; box-shadow: 0 5px 15px rgba(145, 70, 255, 0.3); }
        .tg { background: #0088cc; box-shadow: 0 5px 15px rgba(0, 136, 204, 0.3); }
        .yt { background: #ff0000; box-shadow: 0 5px 15px rgba(255, 0, 0, 0.3); }

        /* Мобильная версия */
        @media (max-width: 850px) {
            .card { flex-direction: column; text-align: center; padding: 40px 25px; }
            .info-side { text-align: center; width: 100%; }
            .profile-img { width: 220px; height: 220px; }
            h1 { font-size: 40px; }
            nav { gap: 15px; }
            nav a { font-size: 10px; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">Главная</a>
        <a href="projects.html">Проекты подписчиков</a>
        <a href="fans.html">Страница подписчиков</a>
    </nav>

    <div class="main-container">
        <div class="card">
            <!-- Здесь твоя фотка avatar.PNG -->
            <img src="avatar.PNG" alt="Morggt" class="profile-img">
            
            <div class="info-side">
                <h1>MORGGT</h1>
                <div class="subtitle">Official Streamer</div>
                
                <div class="links">
                    <a href="https://twitch.tv" target="_blank" class="link twitch">Twitch Channel</a>
                    <a href="https://t.me" target="_blank" class="link tg">Telegram Bot / News</a>
                    <a href="https://youtube.com" target="_blank" class="link yt">YouTube Shorts</a>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
