<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Morggt - Links</title>
    <style>
        body {
            margin: 0; padding: 0;
            /* Более спокойный сине-фиолетовый градиент */
            background: linear-gradient(135deg, #141e30 0%, #243b55 50%, #6a11cb 100%);
            background-attachment: fixed;
            color: white; font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; overflow: hidden; position: relative;
        }

        /* Фоновые фигуры (приглушенные) */
        .bg-shape {
            position: absolute; background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(4px); border: 1px solid rgba(255, 255, 255, 0.05);
            z-index: 1; animation: float 15s infinite ease-in-out;
        }
        .shape1 { width: 100px; height: 100px; top: 10%; left: 10%; border-radius: 20px; }
        .shape2 { width: 150px; height: 150px; bottom: 10%; right: 10%; border-radius: 50%; }
        .shape3 { width: 400px; height: 1px; top: 40%; left: -100px; background: rgba(255,255,255,0.05); transform: rotate(30deg); }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }

        /* Карточка */
        .card {
            background: rgba(13, 13, 15, 0.98);
            padding: 30px; border-radius: 24px;
            display: flex; align-items: center; gap: 30px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.08);
            max-width: 620px; width: 92%; position: relative; z-index: 10;
        }

        .profile-img {
            width: 160px; height: 160px;
            border-radius: 18px; border: 3px solid #772ce8;
            object-fit: cover; box-shadow: 0 0 25px rgba(119, 44, 232, 0.3);
        }

        .info-side { text-align: left; flex: 1; }
        h1 { margin: 0; font-size: 32px; font-weight: 900; letter-spacing: -1px; color: #fff; }
        .subtitle { color: #9146ff; margin: 2px 0 12px 0; font-size: 13px; text-transform: uppercase; font-weight: bold; letter-spacing: 1px; }
        .description { font-size: 13px; line-height: 1.5; color: #9a9ab0; margin-bottom: 20px; }

        /* Сетка кнопок (2 колонки) */
        .links { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 10px; 
        }
        .link {
            text-align: center; color: white; text-decoration: none;
            padding: 12px 5px; border-radius: 10px; font-weight: 700;
            transition: 0.3s ease; text-transform: uppercase; font-size: 11px;
            letter-spacing: 0.5px;
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.05);
        }
        .link:hover { transform: translateY(-2px); filter: brightness(1.1); box-shadow: 0 5px 15px rgba(0,0,0,0.4); }
        
        /* Приглушенные цвета кнопок */
        .twitch { background: #6441a5; }
        .kick { background: #44cc11; color: #000; } /* Чуть темнее зеленого */
        .tg { background: #0077b5; }
        .yt { background: #cc0000; }
        .ds { background: #4e59db; }
        .boosty { background: #d84e1b; }
        .vk { background: #0066cc; }
        .da { background: #f5c400; color: #000; } /* DonationAlerts золотистый */

        @media (max-width: 580px) {
            .card { flex-direction: column; text-align: center; padding: 25px; }
            .info-side { width: 100%; }
            .profile-img { width: 140px; height: 140px; }
            .links { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="bg-shape shape1"></div>
    <div class="bg-shape shape2"></div>
    <div class="bg-shape shape3"></div>

    <div class="card">
        <img src="Morggt.png.png" alt="Morggt" class="profile-img">
        <div class="info-side">
            <h1>MORGGT</h1>
            <div class="subtitle">Official Content Creator</div>
            <div class="description">
                Общаюсь с чатом, создаю движ и ценю каждого в своем комьюнити. Поддерживай и подписывайся!
            </div>
            
            <div class="links">
                <a href="https://twitch.tv" target="_blank" class="link twitch">Twitch</a>
                <a href="https://kick.com" target="_blank" class="link kick">Kick</a>
                <a href="https://t.me" target="_blank" class="link tg">Telegram</a>
                <a href="https://youtube.com" target="_blank" class="link yt">YouTube</a>
                <a href="https://discord.gg" target="_blank" class="link ds">Discord</a>
                <a href="https://boosty.to" target="_blank" class="link boosty">Boosty</a>
                <a href="https://vk.com" target="_blank" class="link vk">VK Group</a>
                <a href="https://www.donationalerts.com/r/morggt" target="_blank" class="link da">Donate</a>
            </div>
        </div>
    </div>

</body>
</html>
