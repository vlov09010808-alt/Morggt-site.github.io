<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Morggt - Official</title>
    <style>
        body {
            margin: 0; padding: 0;
            background: linear-gradient(135deg, #1e3c72 0%, #9146ff 100%);
            color: white; font-family: 'Segoe UI', sans-serif;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }
        /* Верхнее меню */
        nav {
            width: 100%; padding: 20px 0;
            display: flex; justify-content: center; gap: 30px;
            background: rgba(0, 0, 0, 0.2); backdrop-filter: blur(5px);
        }
        nav a {
            color: white; text-decoration: none; font-weight: bold; 
            opacity: 0.8; transition: 0.3s; font-size: 14px; text-transform: uppercase;
        }
        nav a:hover { opacity: 1; color: #bf94ff; }

        /* Контейнер с контентом */
        .main-container {
            display: flex; align-items: center; justify-content: center; flex-grow: 1; padding: 20px;
        }
        .card {
            background: rgba(24, 24, 27, 0.9);
            padding: 40px; border-radius: 30px;
            display: flex; align-items: center; gap: 40px; /* Фото слева, кнопки справа */
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .profile-img {
            width: 250px; height: 250px;
            border-radius: 20px; border: 4px solid #bf94ff;
            object-fit: cover; box-shadow: 0 0 20px rgba(145, 70, 255, 0.3);
        }
        .info-side { text-align: left; width: 300px; }
        h1 { margin: 0 0 5px 0; font-size: 32px; }
        .subtitle { color: #adadb8; margin-bottom: 25px; font-size: 14px; }
        
        .links { display: flex; flex-direction: column; gap: 12px; }
        .link {
            text-align: center; color: white; text-decoration: none;
            padding: 14px; border-radius: 10px; font-weight: bold;
            transition: 0.3s; text-transform: uppercase; font-size: 13px;
        }
        .link:hover { transform: translateX(5px); }
        .twitch { background: #9146ff; }
        .tg { background: #0088cc; }
        .yt { background: #ff0000; }

        /* Адаптация под телефоны */
        @media (max-width: 700px) {
            .card { flex-direction: column; text-align: center; }
            .info-side { text-align: center; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="#">Главная</a>
        <a href="#">Проекты подписчиков</a>
        <a href="#">Страница подписчиков</a>
    </nav>

    <div class="main-container">
        <div class="card">
            <!-- Фото Морица -->
            <img src="https://ibb.co" alt="Morggt" class="profile-img">
            
            <div class="info-side">
                <h1>MORGGT</h1>
                <div class="subtitle">Official Content Creator</div>
                
                <div class="links">
                    <a href="https://twitch.tv" target="_blank" class="link twitch">Twitch</a>
                    <a href="https://t.me" target="_blank" class="link tg">Telegram</a>
                    <a href="https://youtube.com" target="_blank" class="link yt">YouTube</a>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
