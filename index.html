<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Morggt - Official</title>
    <style>
        body {
            margin: 0; padding: 0;
            background: linear-gradient(135deg, #0f2027 0%, #203a43 25%, #2c5364 50%, #9146ff 100%);
            background-attachment: fixed;
            color: white; font-family: 'Segoe UI', sans-serif;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }
        nav {
            width: 100%; padding: 20px 0;
            display: flex; justify-content: center; gap: 35px;
            background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(15px);
            position: sticky; top: 0; z-index: 100; border-bottom: 1px solid rgba(145, 70, 255, 0.3);
        }
        nav a {
            color: white; text-decoration: none; font-weight: 700; 
            opacity: 0.8; transition: 0.3s; font-size: 13px; text-transform: uppercase; letter-spacing: 1px;
        }
        nav a:hover { opacity: 1; color: #bf94ff; text-shadow: 0 0 10px #9146ff; }

        .main-container { display: flex; align-items: center; justify-content: center; flex-grow: 1; padding: 40px 20px; }
        .card {
            background: rgba(15, 15, 20, 0.9);
            padding: 50px; border-radius: 40px;
            display: flex; align-items: center; gap: 50px;
            box-shadow: 0 0 60px rgba(145, 70, 255, 0.2);
            border: 1px solid rgba(145, 70, 255, 0.2);
            max-width: 900px;
        }
        .profile-img {
            width: 300px; height: 300px; border-radius: 30px; border: 4px solid #9146ff;
            object-fit: cover; box-shadow: 0 0 30px rgba(145, 70, 255, 0.5);
        }
        .info-side { text-align: left; }
        h1 { margin: 0; font-size: 55px; font-weight: 900; letter-spacing: -2px; color: #fff; }
        .subtitle { color: #bf94ff; margin-bottom: 35px; font-size: 18px; text-transform: uppercase; font-weight: bold; }
        .links { display: flex; flex-direction: column; gap: 15px; }
        .link {
            text-align: center; color: white; text-decoration: none;
            padding: 18px; border-radius: 15px; font-weight: 800; transition: 0.3s; text-transform: uppercase;
        }
        .link:hover { transform: scale(1.03); box-shadow: 0 0 20px rgba(145, 70, 255, 0.4); }
        .twitch { background: #9146ff; }
        .tg { background: #0088cc; }
        .yt { background: #ff0000; }

        @media (max-width: 850px) {
            .card { flex-direction: column; text-align: center; }
            .profile-img { width: 220px; height: 220px; }
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html">Главная</a>
        <a href="projects.html">Проекты подписчиков</a>
        <a href="fans.html">Страница подписчиков</a>
    </nav>
    <div class="main-container">
        <div class="card">
            <img src="Morggt.png.png" alt="Morggt" class="profile-img">
            <div class="info-side">
                <h1>MORGGT</h1>
                <div class="subtitle">Official Streamer</div>
                <div class="links">
                    <a href="https://twitch.tv" target="_blank" class="link twitch">Twitch Channel</a>
                    <a href="https://t.me" target="_blank" class="link tg">Telegram Channel</a>
                    <a href="https://youtube.com" target="_blank" class="link yt">YouTube Shorts</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
